name: Daily World Cup Data Update

on:
  schedule:
    # Run every day at 6 AM UTC (1 AM EST)
    - cron: '0 6 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-wc-data:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      # Step 4: Configure git
      - name: Configure git
        run: |
          git config --global user.name "World Cup Bot"
          git config --global user.email "bot@world-cup-2026.dev"
      
      # Step 5: Fetch latest World Cup data
      - name: Fetch World Cup data
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}
        run: |
          python scripts/fetch_wc_data.py
          echo "✅ Data fetch complete"
      
      # Step 6: Update predictions
      - name: Update predictions
        run: |
          python scripts/update_predictions.py
          echo "✅ Predictions updated"
      
      # Step 7: Sync to Firebase (optional)
      - name: Sync to Firebase
        run: |
          python scripts/firebase_sync.py || echo "⚠️ Firebase sync skipped (optional)"
      
      # Step 8: Check for changes
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      # Step 9: Commit and push changes
      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add data/current_data.json
          git commit -m "🔄 Update: WC 2026 data, predictions, and leaderboard"
          git push origin main
          echo "✅ Changes committed and pushed"
      
      # Step 10: Verify deployment
      - name: Verify deployment
        run: |
          echo "✅ World Cup 2026 dashboard updated successfully"
          echo "📊 Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🔗 Visit: https://christopherpotter1.github.io/world-cup-2026/"

  # Notify on failure
  notify-failure:
    runs-on: ubuntu-latest
    needs: update-wc-data
    if: failure()
    
    steps:
      - name: Log failure
        run: |
          echo "⚠️ World Cup data update failed"
          echo "Check the workflow logs for details"
