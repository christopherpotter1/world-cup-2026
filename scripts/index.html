<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Pro | Live Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #06b6d4;
            --accent-alt: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-light: #f1f5f9;
            --text-muted: #cbd5e1;
            --border: #334155;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-overlay: rgba(15, 23, 42, 0.95);
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a2f4d 50%, #0f172a 100%);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .header {
            background: var(--bg-overlay);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo { font-size: 1.8em; font-weight: 700; color: var(--accent); }
        .time-display {
            font-size: 0.9em;
            padding: 8px 15px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-weight: 500;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 8px 16px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9em;
        }

        .nav-btn:hover { background: var(--accent); color: var(--primary); }
        .nav-btn.active { background: var(--accent); color: var(--primary); }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .section { display: none; }
        .section.active { display: block; }

        .matches-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .match-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .match-card:hover {
            border-color: var(--accent);
            background: rgba(6, 182, 212, 0.1);
        }

        .match-card.active {
            border-color: var(--accent);
            background: rgba(6, 182, 212, 0.15);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .match-time { font-size: 0.75em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .match-teams {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .team-info { text-align: center; }
        .team-flag { font-size: 2em; margin-bottom: 4px; }
        .team-name { font-size: 0.9em; font-weight: 600; }
        .match-score {
            text-align: center;
            padding: 10px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 8px;
            border: 1px solid var(--accent);
        }

        .score-value { font-size: 1.5em; font-weight: 700; color: var(--accent); }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table th {
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        .leaderboard-table td {
            padding: 12px;
            border: 1px solid var(--border);
        }

        .leaderboard-table tr:hover { background: rgba(6, 182, 212, 0.05); }

        .standings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .group-table {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
        }

        .group-name { font-size: 1.1em; font-weight: 700; color: var(--accent); margin-bottom: 12px; }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .standings-table th {
            background: rgba(6, 182, 212, 0.1);
            padding: 8px 4px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        .standings-table td {
            padding: 8px 4px;
            border-bottom: 1px solid rgba(52, 65, 85, 0.5);
        }

        .team-rank { text-align: center; font-weight: 600; }
        .team-points { text-align: center; font-weight: 700; color: var(--accent); }

        .bracket-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .bracket-round {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
        }

        .bracket-round-title {
            font-size: 1em;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .bracket-match {
            background: rgba(6, 182, 212, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }

        .analysis-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .analysis-text {
            color: var(--text-muted);
            line-height: 1.8;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .stat-box {
            background: rgba(6, 182, 212, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-value { font-size: 1.3em; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.75em; color: var(--text-muted); margin-top: 4px; }

        .footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85em;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; }
            .standings-grid { grid-template-columns: 1fr; }
            .match-teams { grid-template-columns: 1fr; gap: 5px; }
            .nav-tabs { width: 100%; }
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid var(--accent);
            border-radius: 4px;
            font-size: 0.75em;
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-container">
            <div class="logo">⚽ World Cup 2026 Pro</div>
            <div class="time-display">🕐 <span id="estonian-time">--:--:--</span></div>
        </div>
        <div class="nav-tabs" style="margin-top: 15px;">
            <button class="nav-btn active" onclick="showSection('matches')">🎮 Matches</button>
            <button class="nav-btn" onclick="showSection('leaderboard')">🏆 Leaderboard</button>
            <button class="nav-btn" onclick="showSection('standings')">📊 Standings</button>
            <button class="nav-btn" onclick="showSection('bracket')">🏅 Bracket</button>
        </div>
    </div>

    <div class="container">
        <!-- MATCHES SECTION -->
        <div id="matches" class="section active">
            <div class="matches-container" id="matches-grid"></div>
            <div id="match-analysis" class="card" style="display: none;">
                <h2 class="card-title" id="analysis-title"></h2>
                <div id="analysis-content"></div>
            </div>
        </div>

        <!-- LEADERBOARD SECTION -->
        <div id="leaderboard" class="section">
            <div class="card">
                <h2 class="card-title">⚽ Top Scorers</h2>
                <table class="leaderboard-table" id="scorers-table"></table>
            </div>

            <div class="card">
                <h2 class="card-title">🎯 Assists Leaders</h2>
                <table class="leaderboard-table" id="assists-table"></table>
            </div>

            <div class="card">
                <h2 class="card-title">🟨 Cards Leaders</h2>
                <table class="leaderboard-table" id="cards-table"></table>
            </div>
        </div>

        <!-- STANDINGS SECTION -->
        <div id="standings" class="section">
            <div class="standings-grid" id="standings-grid"></div>
        </div>

        <!-- BRACKET SECTION -->
        <div id="bracket" class="section">
            <div class="bracket-container" id="bracket-grid"></div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p>⚽ World Cup 2026 Professional Analysis Platform</p>
            <p>By Christopher Potter | Real-time predictions, stats & analysis</p>
            <p>All times displayed in Estonian Time (UTC+3) | Last updated: <span id="last-updated">--:--:--</span></p>
        </div>
    </div>

    <script>
        let currentData = null;

        // UPDATE ESTONIAN TIME
        function updateTime() {
            const estTime = new Date().toLocaleString('et-EE', {
                timeZone: 'Europe/Tallinn',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            document.getElementById('estonian-time').textContent = estTime;
        }

        updateTime();
        setInterval(updateTime, 1000);

        // LOAD DATA
        async function loadData() {
            try {
                const response = await fetch('data/current_data.json');
                currentData = await response.json();
                renderMatches();
                renderLeaderboard();
                renderStandings();
                renderBracket();
                updateLastUpdated();
            } catch (e) {
                console.error('Error loading data:', e);
                document.querySelector('.container').innerHTML = '<p style="color: var(--danger); padding: 20px;">Error loading data. Please refresh the page.</p>';
            }
        }

        // RENDER MATCHES
        function renderMatches() {
            if (!currentData || !currentData.matches) return;

            const grid = document.getElementById('matches-grid');
            grid.innerHTML = currentData.matches.map((match, idx) => `
                <div class="match-card" onclick="selectMatch(${idx})">
                    <div class="match-time">${match.time.split('T')[0]} ${match.status}</div>
                    <div class="match-teams">
                        <div class="team-info">
                            <div class="team-flag">${match.team1.flag}</div>
                            <div class="team-name">${match.team1.name}</div>
                        </div>
                        <div class="match-score">
                            <div class="score-value">${match.score.team1}-${match.score.team2}</div>
                        </div>
                        <div class="team-info">
                            <div class="team-flag">${match.team2.flag}</div>
                            <div class="team-name">${match.team2.name}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function selectMatch(idx) {
            if (!currentData || !currentData.matches) return;
            const match = currentData.matches[idx];
            const section = document.getElementById('match-analysis');
            const title = document.getElementById('analysis-title');
            const content = document.getElementById('analysis-content');

            title.textContent = `${match.team1.flag} ${match.team1.name} vs ${match.team2.name} ${match.team2.flag}`;
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-value">${match.stats.possession.team1 || match.stats.possession[Object.keys(match.stats.possession)[0]]}%</div>
                        <div class="stat-label">Possession</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value">${match.stats.shots.team1 || match.stats.shots[Object.keys(match.stats.shots)[0]]}</div>
                        <div class="stat-label">Shots</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value">${match.stats.xG.team1 || match.stats.xG[Object.keys(match.stats.xG)[0]]}</div>
                        <div class="stat-label">xG</div>
                    </div>
                </div>
                <div class="analysis-section" style="margin-top: 20px;">
                    <h4 style="color: var(--accent); margin-bottom: 10px;">Predictions</h4>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
                        ${(match.predictions || []).map(p => `
                            <div style="background: rgba(6, 182, 212, 0.1); padding: 10px; border-radius: 6px; text-align: center;">
                                <div style="font-weight: 600; color: var(--accent);">${p.score}</div>
                                <div style="font-size: 0.8em; color: var(--text-muted);">${p.prob} @ ${p.odds}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="analysis-section" style="margin-top: 20px;">
                    <h4 style="color: var(--accent); margin-bottom: 10px;">Analysis</h4>
                    <p class="analysis-text">${match.analysis.prediction || 'No analysis available'}</p>
                </div>
            `;

            content.innerHTML = html;
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth' });
        }

        // RENDER LEADERBOARD
        function renderLeaderboard() {
            if (!currentData || !currentData.leaderboard) return;

            // Scorers
            const scorersHtml = `
                <thead>
                    <tr><th>Rank</th><th>Player</th><th>Team</th><th>Goals</th></tr>
                </thead>
                <tbody>
                    ${currentData.leaderboard.scorers.map(s => `
                        <tr>
                            <td class="team-rank">${s.rank}</td>
                            <td>${s.player}</td>
                            <td>${s.team}</td>
                            <td class="team-points">${s.goals}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
            document.getElementById('scorers-table').innerHTML = scorersHtml;

            // Assists
            const assistsHtml = `
                <thead>
                    <tr><th>Rank</th><th>Player</th><th>Team</th><th>Assists</th></tr>
                </thead>
                <tbody>
                    ${currentData.leaderboard.assists.map(a => `
                        <tr>
                            <td class="team-rank">${a.rank}</td>
                            <td>${a.player}</td>
                            <td>${a.team}</td>
                            <td class="team-points">${a.assists}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
            document.getElementById('assists-table').innerHTML = assistsHtml;

            // Cards
            const cardsHtml = `
                <thead>
                    <tr><th>Rank</th><th>Player</th><th>Team</th><th>🟨</th><th>🔴</th></tr>
                </thead>
                <tbody>
                    ${currentData.leaderboard.cards.map(c => `
                        <tr>
                            <td class="team-rank">${c.rank}</td>
                            <td>${c.player}</td>
                            <td>${c.team}</td>
                            <td class="team-points">${c.yellow}</td>
                            <td class="team-points">${c.red}</td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
            document.getElementById('cards-table').innerHTML = cardsHtml;
        }

        // RENDER STANDINGS
        function renderStandings() {
            if (!currentData || !currentData.standings) return;

            const grid = document.getElementById('standings-grid');
            grid.innerHTML = (currentData.standings.groups || []).map(group => `
                <div class="group-table">
                    <div class="group-name">${group.name}</div>
                    <table class="standings-table">
                        <thead>
                            <tr>
                                <th style="width: 30px;">#</th>
                                <th>Team</th>
                                <th style="text-align: center; width: 25px;">P</th>
                                <th style="text-align: center; width: 25px;">W</th>
                                <th style="text-align: center; width: 25px;">D</th>
                                <th style="text-align: center; width: 25px;">L</th>
                                <th style="text-align: center; width: 25px;">Pts</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${(group.teams || []).map((team, idx) => `
                                <tr>
                                    <td class="team-rank">${idx + 1}</td>
                                    <td><strong>${team.name}</strong></td>
                                    <td style="text-align: center;">${team.played}</td>
                                    <td style="text-align: center;">${team.wins}</td>
                                    <td style="text-align: center;">${team.draws}</td>
                                    <td style="text-align: center;">${team.losses}</td>
                                    <td class="team-points">${team.points}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }

        // RENDER BRACKET
        function renderBracket() {
            const bracket = document.getElementById('bracket-grid');
            bracket.innerHTML = `
                <div class="bracket-round">
                    <div class="bracket-round-title">Round of 16</div>
                    <p style="color: var(--text-muted); font-size: 0.9em;">Tournament begins June 29, 2026</p>
                    <div style="margin-top: 10px; color: var(--text-muted); font-size: 0.85em;">
                        8 matches advancing winners to quarterfinals
                    </div>
                </div>
                <div class="bracket-round">
                    <div class="bracket-round-title">Quarterfinals</div>
                    <p style="color: var(--text-muted); font-size: 0.9em;">July 7-8, 2026</p>
                    <div style="margin-top: 10px; color: var(--text-muted); font-size: 0.85em;">
                        4 matches to determine semifinalists
                    </div>
                </div>
                <div class="bracket-round">
                    <div class="bracket-round-title">Semifinals</div>
                    <p style="color: var(--text-muted); font-size: 0.9em;">July 9-10, 2026</p>
                    <div style="margin-top: 10px; color: var(--text-muted); font-size: 0.85em;">
                        2 matches to find finalists
                    </div>
                </div>
                <div class="bracket-round">
                    <div class="bracket-round-title">Final</div>
                    <p style="color: var(--text-muted); font-size: 0.9em;">July 12, 2026</p>
                    <div style="margin-top: 10px; color: var(--text-muted); font-size: 0.85em;">
                        MetLife Stadium, New Jersey
                    </div>
                </div>
            `;
        }

        // NAVIGATION
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }

        function updateLastUpdated() {
            const lastUpdate = currentData?.updated || new Date().toISOString();
            const date = new Date(lastUpdate).toLocaleString('et-EE', {timeZone: 'Europe/Tallinn'});
            document.getElementById('last-updated').textContent = date;
        }

        // INIT
        loadData();
        setInterval(loadData, 300000); // Refresh every 5 minutes
    </script>
</body>
</html>
