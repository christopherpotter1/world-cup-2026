        .header-container {
            max-width: 1600px;

            justify-content: space-between;

        .logo {

            border-radius: 6px;
            font-weight: 500;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .matches-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;

            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .match-selector::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-alt));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .match-selector:hover {
            border-color: var(--accent);
            background: rgba(6, 182, 212, 0.1);
        }

        .match-selector:hover::before { transform: scaleX(1); }

            border-color: var(--accent);
            background: rgba(6, 182, 212, 0.15);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .match-time {
            font-size: 0.75em;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
            margin: 10px 0;

        .team-info { text-align: center; }
        .team-flag { font-size: 2em; margin-bottom: 4px; }
        .team-name { font-size: 0.9em; font-weight: 600; }

            text-align: center;
            padding: 10px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 8px;
            border: 1px solid var(--accent);

        .match-status { font-size: 0.7em; color: var(--text-muted); margin-top: 4px; }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {

            .header-info { width: 100%; justify-content: center; }
            .match-teams { grid-template-columns: 1fr; gap: 5px; }
            .form-comparison, .h2h-grid { grid-template-columns: 1fr; }
            .logo { font-size: 1.3em; }
        }
    </style>
</head>

                                    </div>
                                </div>
                                <div class="form-comparison">
                                    <div class="form-item">
                                        <div class="form-title">${m.team1.name} Form</div>
                                        <div class="form-value">${m.form[Object.keys(m.form)[0]]}</div>
                                    </div>
                                    <div class="form-item">
                                        <div class="form-title">${m.team2.name} Form</div>
                                        <div class="form-value">${m.form[Object.keys(m.form)[1]]}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="card">
                                <div class="card-title">⚔️ Head to Head</div>
                                <div class="h2h-grid">
                                    <div class="h2h-item">
                                        <div class="h2h-stat">${m.h2h[Object.keys(m.h2h)[0]]}</div>
                                        <div class="h2h-label">${m.team1.name} Wins</div>
                                    </div>
                                    <div class="h2h-item">
                                        <div class="h2h-stat">${m.h2h[Object.keys(m.h2h)[1]]}</div>
                                        <div class="h2h-label">Draws</div>
                                    </div>
                                    <div class="h2h-item">
                                        <div class="h2h-stat">${m.h2h[Object.keys(m.h2h)[2]]}</div>
                                        <div class="h2h-label">${m.team2.name} Wins</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="card" style="margin-bottom: 20px;">
                                <div class="card-title">📈 Form Analysis</div>
                                <div class="analysis-text">
                                    <h4>${m.team1.name} Form:</h4>
                                    <p>${m.analysis.form.split(' | ')[0]}</p>
                                    <h4>${m.team2.name} Form:</h4>
                                    <p>${m.analysis.form.split(' | ')[1] || m.analysis.form}</p>
                                </div>
                            </div>
                            <div class="card">
                                <div class="card-title">👥 Key Players</div>
                                <div class="form-comparison">
                                    <div class="form-item">
                                        <div class="form-title">${m.team1.name}</div>
                                        <ul style="list-style: none; padding: 0; font-size: 0.9em;">
                                            ${m.keyPlayers[Object.keys(m.keyPlayers)[0]].map(p => `<li style="margin: 5px 0; color: var(--text-muted);">• ${p}</li>`).join('')}
                                        </ul>
                                    </div>
                                    <div class="form-item">
                                        <div class="form-title">${m.team2.name}</div>
                                        <ul style="list-style: none; padding: 0; font-size: 0.9em;">
                                            ${m.keyPlayers[Object.keys(m.keyPlayers)[1]].map(p => `<li style="margin: 5px 0; color: var(--text-muted);">• ${p}</li>`).join('')}
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card" style="margin-top: 20px;">
                        <div class="tabs">
                            <button class="tab-btn active" onclick="switchTab('prediction', this)">Prediction</button>
                            <button class="tab-btn" onclick="switchTab('tactics', this)">Tactics</button>
                            <button class="tab-btn" onclick="switchTab('odds', this)">Odds</button>
                        </div>
                        <div id="prediction" class="tab-content active">
                            <div class="analysis-text">
                                <h4>Why ${m.predictions[0].score}?</h4>
                                <p>${m.analysis.prediction}</p>
                                <h4>Probability Assessment:</h4>
                                <p>Confidence Level: 60-70% based on team form, head-to-head, and statistical analysis.</p>
                            </div>
                        </div>
                        <div id="tactics" class="tab-content">
                            <div class="analysis-text">
                                <h4>Tactical Breakdown:</h4>
                                <p>${m.analysis.tactics}</p>
                                <h4>Expected Formations:</h4>
                                <p>${m.team1.name}: 4-3-3 | ${m.team2.name}: 4-2-3-1</p>
                                <h4>Key Tactical Battle:</h4>
                                <p>Midfield control will be decisive. Possession advantage should lead to clear scoring chances.</p>
                            </div>
                        </div>
                        <div id="odds" class="tab-content">
                            <div class="analysis-text">
                                <h4>Betting Odds (European Decimal):</h4>
                                <table class="odds-table">
                                    <tr><th>Outcome</th><th>Odds</th><th>Probability</th></tr>
                                    ${m.predictions.map(p => `<tr><td>${p.score}</td><td>${p.odds}</td><td>${p.prob}</td></tr>`).join('')}
                                </table>
                                <h4 style="margin-top: 20px;">Recommended Bet:</h4>
                                <p><strong>${m.predictions[0].label}:</strong> ${m.predictions[0].score} @ ${m.predictions[0].odds} odds</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function switchTab(tabName, button) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            button.classList.add('active');
        }

        renderMatches();
        renderAnalysis();
    </script>
</body>
</html>
